                { en: "Conference presentation & public speaking", zh: "会议演讲与公众表达" } ] },
            { cat: { en: "Project & Industry Skills", zh: "项目与行业技能" },
              items: [
                { en: "International arts project coordination", zh: "国际艺术项目统筹" },
                { en: "Stakeholder communication", zh: "利益相关方沟通" },

        // ---- Contact. Add wechat / chineseEmail later by filling these in. ----
        const contact = {
            emails: ["djingyi0910@gmail.com"],            // add a Chinese email here later

            linkedin: "https://www.linkedin.com/in/dujingyi0910samantha/",
            wechat: null                                  // e.g. "your-wechat-id"

        };

        // ---- CV file per language (English = .docx, Chinese = .pdf) ----
        const cvFiles = { en: "cv.docx", zh: "cv_ch.pdf" };

        // ===================== Rendering & language switching =====================
        const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
        const pick = (field, lang) => (field && typeof field === "object" && !Array.isArray(field) && "en" in field) ? field[lang] : field;

        // Expand / collapse the details of an experience or project entry.
        function toggleDetails(btn) {
            const li = btn.closest("[data-entry]");
            const det = li.querySelector(".entry-details");
            const icon = btn.querySelector("i");
            const open = !det.classList.toggle("hidden");
            btn.querySelector(".lbl").textContent = open ? btn.dataset.less : btn.dataset.more;
            if (icon) icon.style.transform = open ? "rotate(180deg)" : "";
        }

        // Build one timeline entry with an optional "Show more" details block.
        function entryCard(it, lang, titleField, subField) {
            const summary = pick(it.summary, lang);
            const details = it.details ? pick(it.details, lang) : null;
            const hasDetails = Array.isArray(details) && details.length;
            const more = pick(i18n["more.show"], lang), less = pick(i18n["more.hide"], lang);
            return `
                <li class="ml-6" data-entry>
                    <span class="absolute -left-1.5 mt-1.5 w-3 h-3 rounded-full bg-brand border-2 border-white"></span>
                    <span class="text-xs font-semibold text-brand-dark">${esc(it.period)}</span>
                    <h3 class="font-semibold text-gray-900 leading-snug mt-0.5">${esc(pick(it[titleField], lang))}</h3>
                    <p class="text-sm text-gray-700">${esc(pick(it[subField], lang))}</p>
                    ${summary ? `<p class="text-sm text-gray-600 mt-1.5 leading-relaxed">${esc(summary)}</p>` : ""}
                    ${hasDetails ? `
                        <ul class="entry-details hidden list-disc pl-5 mt-2 space-y-1 text-sm text-gray-600 leading-relaxed">
                            ${details.map(d => `<li>${esc(d)}</li>`).join("")}
                        </ul>
                        <button type="button" onclick="toggleDetails(this)" data-more="${esc(more)}" data-less="${esc(less)}"
                                class="mt-2 text-xs font-semibold text-brand-dark hover:text-brand-darker inline-flex items-center gap-1">
                            <span class="lbl">${esc(more)}</span> <i class="fas fa-chevron-down text-[10px] transition-transform"></i>
                        </button>` : ""}
                </li>`;
        }

        function renderLists(lang) {
            document.getElementById("experience-list").innerHTML =
                experience.map(it => entryCard(it, lang, "role", "org")).join("");

            document.getElementById("projects-list").innerHTML =
                projects.map(it => entryCard(it, lang, "title", "org")).join("");

            document.getElementById("education-list").innerHTML = education.map(it => `
                <li class="ml-6">
                    <span class="absolute -left-1.5 mt-1.5 w-3 h-3 rounded-full bg-brand border-2 border-white"></span>
                    <span class="text-xs font-semibold text-brand-dark">${esc(it.period)}</span>
                    <h3 class="font-semibold text-gray-900 leading-snug mt-0.5">${esc(pick(it.degree, lang))}</h3>
                    <p class="text-sm text-gray-700">${esc(pick(it.school, lang))}</p>
                    ${pick(it.note, lang) ? `<p class="text-sm text-gray-500 mt-1">${esc(pick(it.note, lang))}</p>` : ""}
                </li>
            `).join("");

            document.getElementById("publications-list").innerHTML = publications.flatMap(g =>
                g.items.map(t => `
                    <li class="flex gap-4">
                        <span class="flex-shrink-0 w-16 text-sm font-bold text-brand-dark pt-0.5">${esc(g.year)}</span>
                        <span class="text-gray-700 leading-relaxed">${esc(t)}</span>
                    </li>
                `)
            ).join("");

            document.getElementById("awards-list").innerHTML = awards.map(a => `
                <li class="flex gap-4">
                    <span class="flex-shrink-0 w-16 text-sm font-bold text-brand-dark pt-0.5">${esc(a.year)}</span>
                    <span class="text-gray-700">${esc(pick(a.text, lang))}</span>
                </li>
            `).join("");

            document.getElementById("skills-list").innerHTML = skills.map(c => `
                <div class="mb-6 last:mb-0">
                    <h3 class="font-semibold text-gray-900 mb-3">${esc(pick(c.cat, lang))}</h3>
                    <div class="flex flex-wrap gap-2">
                        ${c.items.map(s => `<span class="inline-flex bg-white border border-gray-200 rounded-full px-3 py-1 text-sm text-gray-700">${esc(pick(s, lang))}</span>`).join("")}
                    </div>
                </div>
            `).join("");

            document.getElementById("languages-list").innerHTML = languages.map(l => `
                <span class="inline-flex items-center gap-2 bg-white border border-gray-200 rounded-full px-4 py-1.5 text-sm">
                    <span class="font-semibold text-gray-800">${esc(pick(l.name, lang))}</span>
                    <span class="text-gray-500">${esc(pick(l.level, lang))}</span>
                </span>
            `).join("");
        }

        function renderContact() {
            document.getElementById("footer-emails").innerHTML = contact.emails.map(e =>
                `<a href="mailto:${esc(e)}" class="block hover:text-brand-light break-all">${esc(e)}</a>`).join("");
            document.getElementById("footer-phones").innerHTML = contact.phones.map(p =>
                `<a href="tel:${esc(p.replace(/\s/g, ""))}" class="block hover:text-brand-light">${esc(p)}</a>`).join("");

            const links = [];
            if (contact.linkedin)
                links.push(`<a href="${esc(contact.linkedin)}" target="_blank" rel="noopener" class="hover:text-brand-light" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>`);
            contact.emails.forEach(e =>
                links.push(`<a href="mailto:${esc(e)}" class="hover:text-brand-light" aria-label="Email"><i class="fas fa-envelope"></i></a>`));
            if (contact.wechat)
                links.push(`<span class="inline-flex items-center gap-1 text-base" title="WeChat"><i class="fab fa-weixin"></i> ${esc(contact.wechat)}</span>`);
            if (contact.xiaohongshu)
                links.push(`<a href="${esc(contact.xiaohongshu)}" target="_blank" rel="noopener" class="hover:text-brand-light" aria-label="Xiaohongshu"><i class="fas fa-book-open"></i></a>`);
            document.getElementById("footer-connect").innerHTML = links.join("");
        }

        function setLang(lang) {
            if (lang !== "en") lang = "zh";
            document.documentElement.setAttribute("lang", lang);
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const entry = i18n[el.getAttribute("data-i18n")];
                if (entry) el.innerHTML = entry[lang];
            });
            const cv = cvFiles[lang];
            if (cv) {
                ["cv-nav", "cv-primary"].forEach(id => {
                    const el = document.getElementById(id);
                    el.setAttribute("href", cv);
                    el.classList.remove("hidden");
                    el.classList.add(id === "cv-nav" ? "inline-block" : "inline-flex");
                });
            }
            renderLists(lang);
            try { localStorage.setItem("jingyi.lang", lang); } catch (e) {}
        }

        // Init — Chinese is the default
        let initial = "zh";
        try { if (localStorage.getItem("jingyi.lang") === "en") initial = "en"; } catch (e) {}
        renderContact();
        setLang(initial);

        document.getElementById("lang-toggle").addEventListener("click", () => {
            setLang(document.documentElement.getAttribute("lang") === "en" ? "zh" : "en");
        });

        // ---- WeChat QR popup ----
        const wechatModal = document.getElementById("wechat-modal");
        const openWechat  = () => { wechatModal.classList.remove("hidden"); document.body.style.overflow = "hidden"; };
        const closeWechat = () => { wechatModal.classList.add("hidden"); document.body.style.overflow = ""; };
        document.getElementById("wechat-btn").addEventListener("click", openWechat);
        document.getElementById("wechat-close").addEventListener("click", closeWechat);
        document.getElementById("wechat-overlay").addEventListener("click", closeWechat);
        document.addEventListener("keydown", e => { if (e.key === "Escape") closeWechat(); });

        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
